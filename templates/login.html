{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PlaylistWeb - Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="main-container">
        <div class="bloco-login">
            <h1 class="titulo">Entre</h1>
            
            <form action="#" method="post"> <p class="label-input">E-mail</p>
                <div class="input-group">
                    <input type="email" placeholder="E-mail" required>
                </div>
                
                <p class="label-input">Senha</p>
                <div class="input-group">
                    <input type="password" placeholder="Senha" required>
                </div>
                
                <button type="submit" class="botao-entrar">ENTRAR</button>
            
            </form>
            
            <p class="texto-cadastro">
                Não Tem Uma Conta? <a href="{% url 'cadastro' %}">Cadastre-se</a>
            </p>
        </div>
    </div>
</body>
</html>
